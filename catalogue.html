<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUTIQUE-2-INCLUS | Catalogue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .product-card { transition: all 0.3s cubic-bezier(.25,.8,.25,1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .amazon-btn { background: #FF9900; color: #131A22; }
        .amazon-btn:hover { background: #e68a00; }
        .category-tab.active { background-color: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">BOUTIQUE-2-INCLUS</h1>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-blue-600">Accueil</a>
                <a href="catalogue.html" class="text-blue-600">Le Catalogue Tout Inclus</a>
                <a href="mailto:kenbouchard2025@gmail.com" class="hover:text-blue-600">Contact</a>
            </nav>
            <button id="menu-toggle" class="md:hidden focus:outline-none">
                <i class="fas fa-bars text-2xl text-gray-600"></i>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 p-4 space-y-4 shadow-lg">
            <a href="index.html" class="block font-medium text-gray-600 hover:text-blue-600">Accueil</a>
            <a href="catalogue.html" class="block font-bold text-blue-600">Le Catalogue Tout Inclus</a>
            <a href="mailto:kenbouchard2025@gmail.com" class="block font-medium text-gray-600 hover:text-blue-600 transition">Contact</a>
        </div>
    </header>

    <!-- Page Title -->
    <section class="bg-blue-600 text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl font-black uppercase tracking-widest">Le Catalogue Tout Inclus</h2>
            <p class="mt-4 text-xl opacity-90 italic">Les pépites du moment sélectionnées par notre IA</p>
        </div>
    </section>

    <!-- Categories / Tabs -->
    <section class="bg-white border-b border-gray-100 sticky top-[72px] z-40">
        <div class="container mx-auto px-4 overflow-x-auto">
            <div class="flex space-x-4 py-6 min-w-max justify-center">
                <button onclick="filterProducts('all')" class="category-tab active px-6 py-2 rounded-full border border-gray-200 font-bold text-sm transition hover:border-blue-600">TOUT</button>
                <button onclick="filterProducts('MARQUE ⭐')" class="category-tab px-6 py-2 rounded-full border border-gray-200 font-bold text-sm transition hover:border-blue-600 uppercase">Marques ⭐</button>
                <button onclick="filterProducts('MAISON & CUISINE')" class="category-tab px-6 py-2 rounded-full border border-gray-200 font-bold text-sm transition hover:border-blue-600 uppercase">Maison & Cuisine</button>
                <button onclick="filterProducts('TECH & GADGETS')" class="category-tab px-6 py-2 rounded-full border border-gray-200 font-bold text-sm transition hover:border-blue-600 uppercase">Tech & Gadgets</button>
                <button onclick="filterProducts('PLEIN AIR & BBQ')" class="category-tab px-6 py-2 rounded-full border border-gray-200 font-bold text-sm transition hover:border-blue-600 uppercase">Plein Air & BBQ</button>
            </div>
        </div>
    </section>

    <!-- Product Grid Section -->
    <section class="py-20">
        <div class="container mx-auto px-4">
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Loading State -->
                <div class="text-center col-span-full py-20">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600 mb-4"></div>
                    <p class="text-gray-500 font-medium italic">Synchronisation automatique du catalogue...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-16 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-2xl font-bold text-white mb-6 uppercase">Boutique-2-Inclus</h1>
            <div class="pt-8 border-t border-gray-800 text-sm">
                <p>&copy; 2026 Boutique-2-Inclus. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

        let allProducts = [];

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (e) {
                console.error('Error loading products:', e);
                document.getElementById('product-list').innerHTML = '<p class="text-center col-span-full text-red-500 font-bold italic">Erreur lors de la synchronisation...</p>';
            }
        }

        function renderProducts(products) {
            const list = document.getElementById('product-list');
            if (products.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-20 bg-white rounded-2xl border-2 border-dashed border-gray-200"><p class="text-gray-400 text-xl font-medium uppercase">Aucun produit dans cette catégorie</p></div>`;
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden product-card flex flex-col">
                    <div class="h-64 bg-white relative group overflow-hidden flex items-center justify-center p-4">
                         <img src="${p.image || 'https://via.placeholder.com/400x400?text=Produit'}" alt="${p.name}" class="max-h-full object-contain transition-transform duration-500 group-hover:scale-110">
                         <div class="absolute top-4 left-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${p.category || 'VÉRIFIÉ IA'}</span>
                         </div>
                         ${p.category === 'MARQUE ⭐' ? '<div class="absolute top-4 right-4 text-blue-600 text-xl"><i class="fas fa-star"></i></div>' : ''}
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <h4 class="text-xl font-black text-gray-900 mb-4 h-14 overflow-hidden uppercase">${p.name}</h4>
                        <p class="text-gray-600 mb-8 h-18 overflow-hidden leading-relaxed">${p.description}</p>
                        <div class="mt-auto pt-6 border-t border-gray-50 flex items-center justify-between">
                            <span class="text-2xl font-black text-gray-900">${p.price || ''}</span>
                            <a href="${p.url}" target="_blank" class="amazon-btn px-6 py-3 rounded-xl font-black text-sm shadow-md transition transform active:scale-95 uppercase">
                               ${p.category === 'MARQUE ⭐' ? 'Explorer ➔' : 'Acheter ➔'}
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category) {
            // Update tabs UI
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.innerText.toUpperCase() === category.toUpperCase() || (category === 'all' && tab.innerText === 'TOUT')) {
                    tab.classList.add('active');
                }
            });

            if (category === 'all') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category.toUpperCase() === category.toUpperCase());
                renderProducts(filtered);
            }
        }

        loadProducts();
    </script>
</body>
</html>
